services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blackjack}
      POSTGRES_USER: ${POSTGRES_USER:-blackjack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blackjack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blackjack} -d ${POSTGRES_DB:-blackjack}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-blackjack}
      POSTGRES_USER: ${POSTGRES_USER:-blackjack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blackjack}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
